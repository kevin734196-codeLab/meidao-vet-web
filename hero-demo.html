*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.kicker{font-size:12px;letter-spacing:.32em;text-transform:uppercase;font-weight:500}

/* ---------- nav (transparent over hero) ---------- */
.nav{position:absolute;top:0;left:0;right:0;z-index:5}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:74px;max-width:var(--maxw);margin:0 auto;padding:0 28px}
.brand{font-family:var(--serif);font-weight:700;font-size:21px;letter-spacing:.04em;color:#fff;display:flex;align-items:center;gap:10px;white-space:nowrap;text-shadow:0 1px 12px rgba(0,0,0,.4)}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--clay)}
.nav-r{display:flex;align-items:center;gap:22px}
.nav-links{display:flex;gap:26px;font-size:14px}
.nav-links a{color:#fff;opacity:.92;position:relative;padding:4px 0;text-shadow:0 1px 10px rgba(0,0,0,.45)}
.nav-links a::after{content:"";position:absolute;left:0;bottom:-2px;width:0;height:1.5px;background:#fff;transition:width .25s var(--ease)}
.nav-links a:hover::after{width:100%}
.lang{font-size:13px;color:#fff;border:1px solid rgba(255,255,255,.6);border-radius:999px;padding:5px 12px;cursor:pointer;background:transparent;font-family:var(--sans);transition:.2s var(--ease)}
.lang:hover{background:#fff;color:var(--sage)}
.nav-cta{display:inline-flex;align-items:center;gap:7px;background:var(--clay);color:#fff;font-size:14px;font-weight:500;padding:9px 18px;border-radius:999px;transition:.2s var(--ease)}
.nav-cta:hover{background:var(--clay-deep)}

/* ---------- hero ---------- */
.hero{position:relative;min-height:100svh;padding:14px;display:flex}
.hero-frame{position:relative;flex:1;border-radius:26px;overflow:hidden;display:flex;align-items:center;
  box-shadow:0 50px 110px -60px rgba(60,50,40,.7)}
/* layer 0: blurred fill of the SAME image — gives a full image-derived background, no empty column */
.hero-blur{position:absolute;inset:0;z-index:0;background:var(--heroimg) center/cover no-repeat;
  filter:blur(36px) saturate(118%) brightness(.96);transform:scale(1.18)}
/* layer 1: the WHOLE sharp image, contained on the right */
.hero-img{position:absolute;inset:0;z-index:0;background:var(--heroimg) right center/contain no-repeat;
  transform:scale(1.03);animation:slowzoom 18s var(--ease) forwards}
@keyframes slowzoom{to{transform:scale(1)}}
/* layer 2: warm mist (readability) — blush+sage, strong bottom-left where text sits, clears top-right over the cat */
.hero-mist{position:absolute;inset:0;z-index:1;pointer-events:none;background:
  linear-gradient(105deg, rgba(60,77,67,.74) 0%, rgba(96,72,60,.42) 34%, rgba(150,108,94,.10) 56%, rgba(150,108,94,0) 74%),
  linear-gradient(0deg, rgba(34,31,26,.55) 0%, rgba(34,31,26,.06) 30%, rgba(34,31,26,0) 55%)}
/* layer 3: grain-free soft vignette for polish */
.hero-vig{position:absolute;inset:0;z-index:1;pointer-events:none;
  box-shadow:inset 0 0 180px 30px rgba(34,31,26,.28)}

.hero-body{position:relative;z-index:2;max-width:var(--maxw);margin:0 auto;width:100%;padding:0 clamp(24px,5vw,68px)}
.hero-col{max-width:600px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;color:#fff;opacity:.95;margin-bottom:22px;text-shadow:0 1px 10px rgba(0,0,0,.5)}
.hero-eyebrow .rule{width:34px;height:1px;background:rgba(255,255,255,.7)}
.hero-display{font-family:var(--serif);font-weight:700;color:#fff;line-height:1.0;letter-spacing:.02em;
  font-size:clamp(64px,11vw,150px);text-shadow:0 4px 40px rgba(0,0,0,.35)}
.hero-display .accent{color:#F2D9C6}
.hero-sub{color:#F4ECE4;font-size:clamp(16px,1.6vw,19px);line-height:1.8;max-width:40ch;margin:26px 0 8px;
  text-shadow:0 1px 14px rgba(0,0,0,.5)}
.cta-row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-top:30px}
.cta-round{display:inline-flex;align-items:center;gap:12px;background:var(--clay);color:#fff;
  border-radius:999px;padding:8px 8px 8px 24px;font-weight:500;font-size:16px;transition:.22s var(--ease)}
.cta-round .ar{width:40px;height:40px;border-radius:50%;background:#fff;color:var(--clay);display:grid;place-items:center;transition:transform .25s var(--ease)}
.cta-round .ar svg{width:17px;height:17px}
.cta-round:hover{background:var(--clay-deep)}.cta-round:hover .ar{transform:rotate(-45deg)}
.cta-ghost{display:inline-flex;align-items:center;gap:9px;color:#fff;font-size:15.5px;border:1.5px solid rgba(255,255,255,.6);border-radius:999px;padding:13px 24px;transition:.2s var(--ease)}
.cta-ghost svg{width:18px;height:18px;fill:currentColor}
.cta-ghost:hover{background:#fff;color:var(--ink);border-color:#fff}

/* trust strip — uses existing data, reframed as a horizontal stat row (real info: 20yr / languages / 3 services) */
.trust{display:flex;gap:clamp(20px,4vw,46px);margin-top:clamp(34px,6vh,64px);flex-wrap:wrap}
.trust .t{color:#fff;text-shadow:0 1px 12px rgba(0,0,0,.5)}
.trust .t b{font-family:var(--serif);font-weight:700;font-size:clamp(24px,2.6vw,34px);display:block;line-height:1.1}
.trust .t span{font-size:12.5px;letter-spacing:.04em;opacity:.9}
.trust .div{width:1px;align-self:stretch;background:rgba(255,255,255,.28)}

/* glass trust card (existing element) — bottom right */
.glass{position:absolute;right:clamp(18px,3vw,44px);bottom:clamp(18px,3vw,44px);z-index:3;
  width:min(320px,74vw);background:rgba(250,248,244,.16);border:1px solid rgba(255,255,255,.34);
  backdrop-filter:blur(15px) saturate(140%);-webkit-backdrop-filter:blur(15px) saturate(140%);
  border-radius:18px;padding:20px 22px;box-shadow:0 24px 56px -28px rgba(0,0,0,.55)}
.glass .gk{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.9);margin-bottom:10px}
.glass .gs{color:#fff;font-size:14.5px;line-height:1.6;text-shadow:0 1px 10px rgba(0,0,0,.4)}

/* scroll cue (signature) */
.scrollcue{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:8px;color:#fff;opacity:.85}
.scrollcue .lbl{font-size:10px;letter-spacing:.3em;text-transform:uppercase;writing-mode:vertical-rl;text-shadow:0 1px 8px rgba(0,0,0,.5)}
.scrollcue .ln{width:1px;height:34px;background:linear-gradient(#fff,transparent);animation:cue 1.8s var(--ease) infinite}
@keyframes cue{0%{transform:scaleY(.3);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}50.1%{transform-origin:bottom}100%{transform:scaleY(.3);transform-origin:bottom}}

.demo-tag{position:fixed;left:14px;bottom:14px;z-index:99;background:var(--ink);color:#fff;font-size:11px;letter-spacing:.1em;padding:6px 12px;border-radius:999px;opacity:.8}

@media(max-width:760px){
  .nav-links{display:none}
  .lang{display:none}
  .brand{font-size:18px}
  .hero-col{max-width:none}
  .glass{display:none}
  .hero-sub{max-width:none}
}
@media(prefers-reduced-motion:reduce){
  .hero-img{animation:none;transform:none}
  .scrollcue .ln{animation:none}
}
</style>
</head>
